# Example: scheduled Portainer stack backups in a container.
#
#   docker compose up -d
#
# Backups are written to ./portainer_backups on the host. Keep credentials out
# of version control: set them in a local .env file (compose loads it
# automatically) rather than editing this file.

services:
  portrieve:
    image: ghcr.io/nopoz/portrieve:latest
    # Or build locally instead of pulling the published image:
    # build: .
    container_name: portrieve
    restart: unless-stopped
    environment:
      PORTAINER_URL: "${PORTAINER_URL:?set PORTAINER_URL in .env}"
      PORTAINER_API_KEY: "${PORTAINER_API_KEY:?set PORTAINER_API_KEY in .env}"
      SCHEDULE: "0 3 * * *"      # daily at 03:00 (cron syntax)
      TZ: "UTC"                  # schedule honours this timezone
      RUN_ON_START: "true"       # also export once when the container starts
      # PORTAINER_INSECURE: "true"  # skip TLS verify for a self-signed/private cert
      # Backups hold secrets (.env, metadata). Files are owner-only (umask 077)
      # by default. Quote these values: unquoted, YAML reads a leading-zero
      # number like 077 as octal (63) and the container gets the wrong value.
      # PORTAINER_BACKUP_UMASK: "077"  # owner-only (default); "027" for group read
      # PUID: "1000"             # own the exported files as this user (default: root)
      # PGID: "1000"             # ...and this group
    volumes:
      - ./portainer_backups:/backup
