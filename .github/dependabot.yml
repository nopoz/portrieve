version: 2
updates:
  # Keep the SHA-pinned actions current (Dependabot bumps the pin and the
  # trailing version comment together).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Watch the Alpine base image in the Dockerfile.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build
